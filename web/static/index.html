<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 14px 24px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #f0f6fc; }
    header .badge {
      font-size: 0.7rem; background: #1f6feb; color: #fff;
      padding: 2px 8px; border-radius: 20px; font-weight: 500;
    }

    /* ===== CENTER PANEL ===== */
    .panel-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 28px 20px;
    }

    .center-panel {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 22px 20px;
    }

    label.section-label {
      font-size: 0.75rem;
      color: #8b949e;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 5px;
    }

    textarea {
      width: 100%; height: 260px;
      background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
      color: #e1e4e8; font-size: 0.92rem; padding: 9px 11px;
      resize: vertical; font-family: inherit; line-height: 1.5;
      transition: border-color 0.15s; outline: none;
    }
    textarea:focus { border-color: #1f6feb; }
    textarea::placeholder { color: #484f58; }

    .options-section { display: flex; flex-direction: column; gap: 8px; }

    .two-col { display: flex; gap: 8px; }
    .two-col > * { flex: 1; }

    .checkbox-row {
      display: flex; align-items: center; gap: 9px;
      cursor: pointer; user-select: none;
    }
    .checkbox-row input[type="checkbox"] {
      width: 15px; height: 15px; accent-color: #1f6feb; cursor: pointer;
    }
    .checkbox-row span { font-size: 0.88rem; color: #c9d1d9; }

    input[type="text"], select {
      width: 100%;
      background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
      color: #e1e4e8; font-size: 0.88rem; padding: 7px 11px;
      outline: none; font-family: inherit; transition: border-color 0.15s;
      cursor: pointer;
    }
    input[type="text"] { cursor: text; }
    input[type="text"]:focus, select:focus { border-color: #1f6feb; }
    input[type="text"]::placeholder { color: #484f58; }

    #generate-btn {
      width: 100%; padding: 10px;
      background: #1f6feb; color: #fff; border: none; border-radius: 8px;
      font-size: 0.98rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    #generate-btn:hover:not(:disabled) { background: #388bfd; }
    #generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #view-sheet-btn {
      display: none;
      width: 100%; padding: 9px;
      background: transparent; color: #1f6feb;
      border: 1px solid #1f6feb; border-radius: 8px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    #view-sheet-btn:hover { background: rgba(31,111,235,0.1); }

    .status-area {
      background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
      padding: 9px 11px; min-height: 60px; max-height: 140px;
      overflow-y: auto;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.76rem; line-height: 1.6; color: #8b949e;
    }
    .status-area .msg       { color: #c9d1d9; }
    .status-area .msg-error { color: #f85149; }
    .status-area .msg-success { color: #3fb950; }

    /* ===== SHEET MODAL ===== */
    .sheet-modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 50;
      align-items: center;
      justify-content: center;
    }
    .sheet-modal.open { display: flex; }

    .sheet-modal-inner {
      width: 92vw; height: 88vh;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sheet-modal.open .sheet-modal-inner {
      animation: modal-in 0.16s ease;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    .modal-topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    #modal-title { font-size: 0.85rem; color: #8b949e; white-space: nowrap; }

    #modified-badge {
      font-size: 0.75rem; color: #f8c537; font-weight: 500;
      display: none; white-space: nowrap;
    }

    .sheet-toggle { display: none; gap: 3px; }
    .sheet-toggle button {
      font-size: 0.78rem; font-weight: 600;
      border: none; border-radius: 4px; cursor: pointer;
      padding: 3px 10px; transition: background 0.12s, color 0.12s;
    }
    .sheet-toggle button.active { background: #1f6feb; color: #fff; }
    .sheet-toggle button:not(.active) { background: #30363d; color: #8b949e; }

    .topbar-spacer { flex: 1; }

    #download-area { display: flex; gap: 6px; align-items: center; }

    .download-link {
      padding: 5px 14px;
      background: #238636; color: #fff; border-radius: 6px;
      text-decoration: none; font-size: 0.83rem; font-weight: 600;
      transition: background 0.15s; white-space: nowrap;
    }
    .download-link:hover { background: #2ea043; }

    #close-modal-btn {
      background: none; border: none; color: #8b949e;
      font-size: 1.1rem; cursor: pointer; padding: 2px 6px;
      border-radius: 4px; line-height: 1; margin-left: 4px;
    }
    #close-modal-btn:hover { background: #30363d; color: #e1e4e8; }

    /* ===== IMAGE GRID ===== */
    .image-grid {
      flex: 1; min-height: 0; display: grid; gap: 4px;
      padding: 10px; overflow-y: auto; background: #0d1117;
      align-content: start;
    }

    /* ===== CARD ===== */
    .card-wrapper {
      position: relative; overflow: hidden;
      border-radius: 5px; background: #161b22; cursor: grab;
    }
    .card-wrapper:active { cursor: grabbing; }
    .card-wrapper img {
      width: 100%; display: block;
      aspect-ratio: 7/10; object-fit: cover;
    }
    .card-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.58);
      display: flex; align-items: center; justify-content: center; gap: 6px;
      opacity: 0; transition: opacity 0.15s;
    }
    .card-wrapper:hover .card-overlay { opacity: 1; }
    .card-btn {
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.28);
      color: #fff; border-radius: 5px;
      padding: 5px 9px; cursor: pointer;
      font-size: 0.82rem; transition: background 0.1s;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .card-btn:hover { background: rgba(255,255,255,0.28); }
    .card-btn.del { border-color: rgba(248,81,73,0.5); }
    .card-btn.del:hover { background: rgba(248,81,73,0.3); }
    .card-wrapper.drag-over { outline: 2px solid #1f6feb; border-radius: 5px; }
    .card-wrapper.dragging { opacity: 0.35; }

    /* ===== CROP MODAL ===== */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #161b22; border: 1px solid #30363d; border-radius: 12px;
      padding: 20px; max-width: 90vw; max-height: 90vh;
      display: flex; flex-direction: column; gap: 12px;
    }
    .modal h2 { font-size: 1rem; color: #f0f6fc; }
    #crop-canvas { max-width: 100%; max-height: 60vh; cursor: crosshair; border-radius: 6px; }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btns button {
      padding: 7px 16px; border-radius: 6px; border: none;
      cursor: pointer; font-size: 0.88rem; font-weight: 600;
    }
    #crop-confirm { background: #238636; color: #fff; }
    #crop-cancel  { background: #30363d; color: #c9d1d9; }
  </style>
</head>
<body>

<header>
  <h1>ImgSheet Generator</h1>
  <span class="badge">Web</span>
</header>

<div class="panel-wrapper">
  <div class="center-panel">

    <div>
      <label class="section-label">History</label>
      <select id="history-select"><option value="">Load a previous sheet...</option></select>
    </div>

    <div>
      <label class="section-label">Characters</label>
      <textarea id="prompts"
        placeholder="Enter character names, one per line or comma separated&#10;&#10;e.g. Goku&#10;Naruto&#10;Luffy"
        spellcheck="false"></textarea>
    </div>

    <div class="options-section">
      <label class="section-label">Options</label>

      <div class="two-col">
        <select id="opt-engine">
          <option value="serpapi">Google (SerpAPI)</option>
          <option value="brave">Brave</option>
          <option value="test">Test (no search)</option>
        </select>
        <select id="opt-paper">
          <option value="B4">B4 (257×364mm)</option>
          <option value="B5">B5 (182×257mm)</option>
          <option value="A4">A4 (210×297mm)</option>
          <option value="Letter">Letter (216×279mm)</option>
          <option value="A3">A3 (297×420mm)</option>
        </select>
      </div>

      <select id="opt-layout">
        <option value="5x5">5×5 (25 cards)</option>
        <option value="5x6">5×6 (30 cards)</option>
        <option value="4x4">4×4 (16 cards)</option>
        <option value="3x3">3×3 (9 cards)</option>
        <option value="2x2">2×2 (4 cards)</option>
      </select>

      <label class="checkbox-row">
        <input type="checkbox" id="opt-pdf" />
        <span>Export PDF</span>
      </label>

      <label class="checkbox-row">
        <input type="checkbox" id="opt-double" />
        <span>Double-sided (generates back sheet with mirrored columns)</span>
      </label>

      <input type="text" id="opt-email" placeholder="Send to email (optional)" />
    </div>

    <button id="generate-btn">Generate Sheet</button>
    <button id="view-sheet-btn">View sheet</button>

    <div>
      <label class="section-label">Status</label>
      <div class="status-area" id="status-area">
        <span style="color:#484f58">Ready. Enter characters and click Generate.</span>
      </div>
    </div>

  </div>
</div>

<!-- SHEET MODAL -->
<div class="sheet-modal" id="sheet-modal">
  <div class="sheet-modal-inner">
    <div class="modal-topbar">
      <span id="modal-title">Preview</span>
      <span id="modified-badge">&#9679; Unsaved changes</span>
      <div class="sheet-toggle" id="sheet-toggle">
        <button id="btn-front" class="active" onclick="switchSheet('front')">Front</button>
        <button id="btn-back"                onclick="switchSheet('back')">Back</button>
      </div>
      <div class="topbar-spacer"></div>
      <div id="download-area"></div>
      <button id="close-modal-btn" title="Close (Esc)">&#x2715;</button>
    </div>
    <div class="image-grid" id="image-grid"></div>
  </div>
</div>

<!-- CROP MODAL -->
<div class="modal-backdrop" id="crop-modal">
  <div class="modal">
    <h2>Crop / Reframe</h2>
    <canvas id="crop-canvas"></canvas>
    <div style="font-size:0.78rem; color:#8b949e;">Drag to select crop area. Release to apply.</div>
    <div class="modal-btns">
      <button id="crop-cancel">Cancel</button>
      <button id="crop-confirm">Apply Crop</button>
    </div>
  </div>
</div>

<script>
  // ===== STATE =====
  let activeJobId   = null;
  let dragSrcIdx    = null;
  let currentCols   = 5;
  let currentSheet  = 'front';
  let backCount     = 0;
  let cropCardIdx   = null;
  let cropSrc       = null;
  let cropRect      = { x: 0, y: 0, w: 0, h: 0 };
  let cropDragging  = false;
  let cropStart     = { x: 0, y: 0 };

  // ===== ELEMENTS =====
  const promptsEl     = document.getElementById("prompts");
  const generateBtn   = document.getElementById("generate-btn");
  const viewSheetBtn  = document.getElementById("view-sheet-btn");
  const statusArea    = document.getElementById("status-area");
  const downloadArea  = document.getElementById("download-area");
  const modifiedBadge = document.getElementById("modified-badge");
  const historySelect = document.getElementById("history-select");
  const optLayout     = document.getElementById("opt-layout");
  const optPaper      = document.getElementById("opt-paper");
  const optEngine     = document.getElementById("opt-engine");
  const optPdf        = document.getElementById("opt-pdf");
  const optDouble     = document.getElementById("opt-double");
  const optEmail      = document.getElementById("opt-email");
  const sheetModal    = document.getElementById("sheet-modal");
  const sheetToggle   = document.getElementById("sheet-toggle");
  const btnFront      = document.getElementById("btn-front");
  const btnBack       = document.getElementById("btn-back");
  const modalTitle    = document.getElementById("modal-title");
  const imageGrid     = document.getElementById("image-grid");
  const cropModal     = document.getElementById("crop-modal");
  const cropCanvas    = document.getElementById("crop-canvas");
  const cropCtx       = cropCanvas.getContext("2d");

  // ===== UTILITIES =====
  function parseNames(text) {
    return text.split(/[\n,]/).map(s => s.trim()).filter(Boolean).slice(0, 25);
  }

  function getLayoutDims() {
    const [r, c] = optLayout.value.split('x').map(Number);
    return { rows: r, cols: c };
  }

  // ===== HISTORY =====
  const HISTORY_KEY = 'imgsheet_history';

  function saveToHistory(names) {
    const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    const label = names.slice(0, 4).join(', ') + (names.length > 4 ? ` (+${names.length - 4})` : '');
    history.unshift({ names, label, date: new Date().toLocaleDateString() });
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, 20)));
    renderHistory();
  }

  function renderHistory() {
    const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    historySelect.innerHTML = '<option value="">Load a previous sheet...</option>';
    history.forEach((h, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${h.date} — ${h.label}`;
      historySelect.appendChild(opt);
    });
  }

  historySelect.addEventListener('change', () => {
    const idx = historySelect.value;
    if (idx === '') return;
    const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    const h = history[parseInt(idx)];
    if (h) promptsEl.value = h.names.join('\n');
    historySelect.value = '';
  });

  renderHistory();

  const PAPER_LAYOUTS = { B4: '5x5', B5: '3x3', A3: '5x6', A4: '4x4', Letter: '4x4' };
  optPaper.addEventListener('change', () => {
    const layout = PAPER_LAYOUTS[optPaper.value];
    if (layout) optLayout.value = layout;
  });

  // ===== MODAL =====
  function openModal() {
    sheetModal.classList.add('open');
  }

  function closeModal() {
    sheetModal.classList.remove('open');
  }

  document.getElementById('close-modal-btn').addEventListener('click', closeModal);

  sheetModal.addEventListener('click', (e) => {
    if (e.target === sheetModal) closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && sheetModal.classList.contains('open')) closeModal();
  });

  viewSheetBtn.addEventListener('click', openModal);

  // ===== STATUS =====
  function clearStatus() {
    statusArea.innerHTML = '';
    downloadArea.innerHTML = '';
    modifiedBadge.style.display = 'none';
    sheetToggle.style.display = 'none';
    imageGrid.innerHTML = '';
    currentSheet = 'front';
    backCount = 0;
    viewSheetBtn.style.display = 'none';
  }

  function appendStatus(text, cls = 'msg') {
    const div = document.createElement('div');
    div.className = cls;
    div.textContent = text;
    statusArea.appendChild(div);
    statusArea.scrollTop = statusArea.scrollHeight;
  }

  function markModified() {
    modifiedBadge.style.display = 'inline';
  }

  // ===== GRID =====
  function showGrid(jobId, count, cols, isBack = false) {
    imageGrid.innerHTML = '';
    activeJobId = jobId;
    currentCols = cols || currentCols;
    imageGrid.style.gridTemplateColumns = `repeat(${currentCols}, 1fr)`;

    const urlPrefix = isBack ? 'back_image' : 'image';
    for (let i = 0; i < count; i++) {
      imageGrid.appendChild(makeCard(jobId, i, isBack, urlPrefix));
    }

    modalTitle.textContent = isBack
      ? `Back sheet — ${count} cards (columns mirrored)`
      : `${count} cards`;

    openModal();
  }

  function switchSheet(side) {
    if (side === currentSheet || !activeJobId) return;
    currentSheet = side;
    btnFront.classList.toggle('active', side === 'front');
    btnBack.classList.toggle('active', side === 'back');
    if (side === 'front') {
      showGrid(activeJobId, imageGrid.dataset.frontCount, currentCols, false);
    } else {
      showGrid(activeJobId, backCount, currentCols, true);
    }
  }

  // ===== CARD =====
  function makeCard(jobId, idx, isBack = false, urlPrefix = 'image') {
    const wrapper = document.createElement('div');
    wrapper.className = 'card-wrapper';
    wrapper.dataset.idx = idx;

    const img = document.createElement('img');
    img.src = `/${urlPrefix}/${jobId}/${idx}?t=${Date.now()}`;
    img.alt = `Card ${idx + 1}`;
    wrapper.appendChild(img);

    if (!isBack) {
      wrapper.draggable = true;

      const overlay = document.createElement('div');
      overlay.className = 'card-overlay';

      const swapBtn = btn('&#x27F3;', 'Swap image');
      const delBtn  = btn('&#x2715;', 'Remove card', 'del');
      const cropBtn = btn('&#x2702;', 'Crop / reframe');

      const uploadLabel = document.createElement('label');
      uploadLabel.className = 'card-btn';
      uploadLabel.title = 'Upload custom image';
      uploadLabel.innerHTML = '&#x2191;';
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.style.display = 'none';
      uploadLabel.appendChild(fileInput);

      overlay.append(swapBtn, delBtn, cropBtn, uploadLabel);
      wrapper.appendChild(overlay);

      swapBtn.addEventListener('click', (e) => { e.stopPropagation(); swapCard(idx); });
      delBtn.addEventListener('click',  (e) => { e.stopPropagation(); deleteCard(idx); });
      cropBtn.addEventListener('click', (e) => { e.stopPropagation(); openCrop(idx, img.src); });
      fileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) uploadCard(idx, e.target.files[0]);
      });

      wrapper.addEventListener('dragstart', (e) => {
        dragSrcIdx = parseInt(wrapper.dataset.idx);
        wrapper.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      wrapper.addEventListener('dragend', () => wrapper.classList.remove('dragging'));
      wrapper.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (e.dataTransfer.files.length === 0) {
          e.dataTransfer.dropEffect = 'move';
          wrapper.classList.add('drag-over');
        }
      });
      wrapper.addEventListener('dragleave', () => wrapper.classList.remove('drag-over'));
      wrapper.addEventListener('drop', async (e) => {
        e.preventDefault();
        wrapper.classList.remove('drag-over');
        const toIdx = parseInt(wrapper.dataset.idx);
        if (e.dataTransfer.files.length > 0) {
          await uploadCard(toIdx, e.dataTransfer.files[0]);
        } else if (dragSrcIdx !== null && dragSrcIdx !== toIdx) {
          await reorderCard(dragSrcIdx, toIdx);
        }
        dragSrcIdx = null;
      });
    }

    return wrapper;
  }

  function btn(html, title, extraClass) {
    const b = document.createElement('button');
    b.className = 'card-btn' + (extraClass ? ' ' + extraClass : '');
    b.innerHTML = html;
    b.title = title;
    return b;
  }

  function refreshCardImg(idx) {
    const wrapper = imageGrid.children[idx];
    if (!wrapper) return;
    const prefix = currentSheet === 'back' ? 'back_image' : 'image';
    wrapper.querySelector('img').src = `/${prefix}/${activeJobId}/${idx}?t=${Date.now()}`;
  }

  // ===== CARD OPERATIONS =====
  async function swapCard(idx) {
    const res = await fetch(`/swap/${activeJobId}/${idx}`, { method: 'POST' });
    if (!res.ok) { appendStatus('No more candidates for this card.', 'msg-error'); return; }
    refreshCardImg(idx);
    markModified();
  }

  async function deleteCard(idx) {
    const res = await fetch(`/card/${activeJobId}/${idx}`, { method: 'DELETE' });
    if (!res.ok) return;
    const data = await res.json();
    imageGrid.children[idx].remove();
    [...imageGrid.children].forEach((el, i) => el.dataset.idx = i);
    modalTitle.textContent = `${data.count} cards`;
    markModified();
  }

  async function uploadCard(idx, file) {
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch(`/upload/${activeJobId}/${idx}`, { method: 'POST', body: fd });
    if (!res.ok) { appendStatus('Upload failed.', 'msg-error'); return; }
    refreshCardImg(idx);
    markModified();
  }

  async function reorderCard(fromIdx, toIdx) {
    const count = imageGrid.children.length;
    const order = [...Array(count).keys()];
    order.splice(fromIdx, 1);
    order.splice(toIdx, 0, fromIdx);

    const res = await fetch(`/reorder/${activeJobId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ order }),
    });
    if (!res.ok) return;

    const movedEl = imageGrid.children[fromIdx];
    const elements = [...imageGrid.children];
    elements.splice(fromIdx, 1);
    elements.splice(toIdx, 0, movedEl);
    elements.forEach((el, i) => { el.dataset.idx = i; imageGrid.appendChild(el); });
    markModified();
  }

  // ===== CROP =====
  let cropImg = new window.Image();

  function openCrop(idx, src) {
    cropCardIdx = idx;
    cropSrc = src.split('?')[0];
    cropImg = new window.Image();
    cropImg.crossOrigin = 'anonymous';
    cropImg.onload = () => {
      const maxW = Math.min(cropImg.width, window.innerWidth * 0.8);
      const scale = maxW / cropImg.width;
      cropCanvas.width  = Math.round(cropImg.width  * scale);
      cropCanvas.height = Math.round(cropImg.height * scale);
      cropRect = { x: 0, y: 0, w: cropCanvas.width, h: cropCanvas.height };
      drawCrop();
    };
    cropImg.src = cropSrc;
    cropModal.classList.add('open');
  }

  function drawCrop() {
    cropCtx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
    cropCtx.drawImage(cropImg, 0, 0, cropCanvas.width, cropCanvas.height);
    cropCtx.fillStyle = 'rgba(0,0,0,0.45)';
    cropCtx.fillRect(0, 0, cropCanvas.width, cropCanvas.height);
    cropCtx.drawImage(
      cropImg,
      (cropRect.x / cropCanvas.width) * cropImg.width,
      (cropRect.y / cropCanvas.height) * cropImg.height,
      (cropRect.w / cropCanvas.width) * cropImg.width,
      (cropRect.h / cropCanvas.height) * cropImg.height,
      cropRect.x, cropRect.y, cropRect.w, cropRect.h
    );
    cropCtx.strokeStyle = '#1f6feb';
    cropCtx.lineWidth = 2;
    cropCtx.strokeRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);
  }

  cropCanvas.addEventListener('mousedown', (e) => {
    const r = cropCanvas.getBoundingClientRect();
    cropStart = { x: e.clientX - r.left, y: e.clientY - r.top };
    cropDragging = true;
  });
  cropCanvas.addEventListener('mousemove', (e) => {
    if (!cropDragging) return;
    const r = cropCanvas.getBoundingClientRect();
    const cx = e.clientX - r.left;
    const cy = e.clientY - r.top;
    cropRect = {
      x: Math.min(cropStart.x, cx),
      y: Math.min(cropStart.y, cy),
      w: Math.abs(cx - cropStart.x),
      h: Math.abs(cy - cropStart.y),
    };
    drawCrop();
  });
  cropCanvas.addEventListener('mouseup', () => { cropDragging = false; });

  document.getElementById('crop-cancel').addEventListener('click', () => {
    cropModal.classList.remove('open');
  });

  document.getElementById('crop-confirm').addEventListener('click', async () => {
    if (cropRect.w < 10 || cropRect.h < 10) { cropModal.classList.remove('open'); return; }
    const scaleX = cropImg.width  / cropCanvas.width;
    const scaleY = cropImg.height / cropCanvas.height;
    const off = document.createElement('canvas');
    off.width  = Math.round(cropRect.w * scaleX);
    off.height = Math.round(cropRect.h * scaleY);
    off.getContext('2d').drawImage(
      cropImg,
      cropRect.x * scaleX, cropRect.y * scaleY,
      off.width, off.height,
      0, 0, off.width, off.height
    );
    off.toBlob(async (blob) => {
      const fd = new FormData();
      fd.append('file', blob, 'crop.jpg');
      const res = await fetch(`/upload/${activeJobId}/${cropCardIdx}`, { method: 'POST', body: fd });
      if (res.ok) { refreshCardImg(cropCardIdx); markModified(); }
      cropModal.classList.remove('open');
    }, 'image/jpeg', 0.92);
  });

  // ===== GENERATE =====
  generateBtn.addEventListener('click', async () => {
    const names = parseNames(promptsEl.value);
    if (names.length === 0) {
      appendStatus('Please enter at least one character name.', 'msg-error');
      return;
    }

    clearStatus();
    generateBtn.disabled = true;
    generateBtn.textContent = 'Generating…';
    appendStatus(`Starting pipeline for: ${names.join(', ')}`, 'msg');

    const { rows, cols } = getLayoutDims();
    currentCols = cols;

    let jobId;
    try {
      const res = await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prompts: names,
          use_claude: false,
          export_pdf: optPdf.checked,
          randomize: false,
          search_engine: optEngine.value,
          send_email_to: optEmail.value.trim(),
          rows,
          cols,
          paper_size: optPaper.value,
          double_sided: optDouble.checked,
        }),
      });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();
      jobId = data.job_id;
    } catch (e) {
      appendStatus(`Error: ${e.message}`, 'msg-error');
      generateBtn.disabled = false;
      generateBtn.textContent = 'Generate Sheet';
      return;
    }

    const evtSource = new EventSource(`/progress/${jobId}`);
    evtSource.onmessage = (e) => appendStatus(e.data);

    evtSource.addEventListener('done', async (e) => {
      evtSource.close();
      appendStatus('Done!', 'msg-success');
      generateBtn.disabled = false;
      generateBtn.textContent = 'Generate Sheet';

      const link = document.createElement('a');
      link.href = `/download/${e.data}`;
      link.className = 'download-link';
      link.textContent = 'Download .docx';
      downloadArea.appendChild(link);

      saveToHistory(names);
      viewSheetBtn.style.display = 'block';

      try {
        const r = await fetch(`/images/${e.data}`);
        const d = await r.json();
        backCount = d.back_count || 0;
        imageGrid.dataset.frontCount = d.count;

        if (backCount > 0) {
          sheetToggle.style.display = 'flex';
          btnFront.classList.add('active');
          btnBack.classList.remove('active');
          currentSheet = 'front';
        }

        showGrid(e.data, d.count, cols);
      } catch {
        showGrid(e.data, rows * cols, cols);
      }
    });

    evtSource.addEventListener('error', (e) => {
      evtSource.close();
      appendStatus(`Error: ${e.data || 'Unknown error'}`, 'msg-error');
      generateBtn.disabled = false;
      generateBtn.textContent = 'Generate Sheet';
    });

    evtSource.onerror = () => {
      if (evtSource.readyState === EventSource.CLOSED) return;
      evtSource.close();
      appendStatus('Connection lost.', 'msg-error');
      generateBtn.disabled = false;
      generateBtn.textContent = 'Generate Sheet';
    };
  });
</script>
</body>
</html>
